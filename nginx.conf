server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Serve weekly_report.json from a mountable data volume when present,
    # otherwise fall through to the static dir (404 if nothing is there).
    location = /weekly_report.json {
        root /usr/share/nginx/data;
        try_files /weekly_report.json @fallback;
        add_header Cache-Control "no-store";
    }

    location @fallback {
        return 404;
    }

    # SPA — always serve index.html for unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Basic static asset caching.
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
